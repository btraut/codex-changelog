name: Check Codex Release

on:
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Preview all releases newer than last-posted-version.txt'
        required: false
        default: 'false'
      post_digest:
        description: 'Preview the pending daily digest'
        required: false
        default: 'false'

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check for new release
        env:
          BACKFILL: ${{ github.event.inputs.backfill || 'false' }}
          POST_DIGEST: ${{ github.event.inputs.post_digest || 'false' }}
        run: npx tsx src/index.ts
