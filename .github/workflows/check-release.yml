name: Check Codex Release

on:
  schedule:
    - cron: '*/15 * * * *'
    - cron: '55 5 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Post all releases newer than last-posted-version.txt'
        required: false
        default: 'false'
      post_digest:
        description: 'Post the pending daily digest'
        required: false
        default: 'false'

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check for new release and post
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BACKFILL: ${{ github.event.inputs.backfill || 'false' }}
          POST_DIGEST: ${{ github.event.inputs.post_digest || (github.event.schedule == '55 5 * * *' && 'true' || 'false') }}
        run: npx tsx src/index.ts
      - name: Commit updated state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/state.json data/last-posted-version.txt
          git diff --staged --quiet || git commit -m 'Update bot state'
          git push
